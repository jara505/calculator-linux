<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora de Particiones Linux</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Calculadora de Particiones Linux</h1>
  <form id="partitionForm" autocomplete="off" novalidate>
    <label for="diskSize">Tamaño total del disco (GB):</label>
    <input type="number" id="diskSize" min="10" step="1" required placeholder="Ej: 500" />

    <label for="ramSize">Cantidad de RAM (GB, opcional):</label>
    <input type="number" id="ramSize" min="1" step="1" placeholder="Ej: 6" />

    <label class="checkbox-label">
      <input type="checkbox" id="hibernate" />
      Soporte para hibernación
    </label>

    <div class="error" id="errorMsg"></div>
    <button type="submit">Calcular</button>
  </form>

  <div class="result" id="result" style="display:none;">
    <h2>Recomendación de particiones</h2>
    <div class="disk-bar" id="diskBar"></div>
    <div class="disk-legend" id="diskLegend"></div>
    <table>
      <thead>
        <tr><th>Partición</th><th>Tamaño recomendado</th><th>Sistema de archivos</th></tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
    <ul class="notes">
      <li><code>/boot/efi</code> — Necesaria en sistemas UEFI.</li>
      <li><code>/</code> — Partición raíz del sistema.</li>
      <li><code>/home</code> — Archivos personales del usuario.</li>
    </ul>
  </div>

  <div class="info-wrapper">
    <button class="info-btn" id="infoBtn" aria-label="Información" title="Información">&#9432;</button>
    <div class="info-tooltip" id="infoTooltip">Hecho por Juan Jara</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
